name: Release Gates

on:
  push:
  pull_request:

jobs:
  release-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run release gates
        run: python scripts/release_gates.py
